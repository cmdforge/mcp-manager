name: Publish Package
on:
  push:
    tags:
      - 'jsonrpc-v*'

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false  # never use caching in release builds
      - run: corepack enable
      - run: corepack pnpm install
      - run: pnpm install
      - run: cp README.md packages/jsonrpc/README.md
      - run: cp LICENSE packages/jsonrpc/LICENSE
      - run: pnpm --filter @cmdforge/jsonrpc publish --no-git-checks  # Or: npm stage publish